<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应链数据分析</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background-color: #0f172a; color: #f1f5f9; }
.card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
.choice { margin: 0.5rem 0; }
</style>
</head>
<body class="px-4 py-10">
  <div class="max-w-4xl mx-auto">
    <a href="index.html" class="text-blue-400 mb-6 inline-block">← 返回首页</a>

    <div class="card">
      <h1 class="text-2xl font-bold mb-3">供应链数据分析</h1>
      <p class="text-slate-400 leading-relaxed">
        本课程聚焦供应链业务场景，学习库存、订单、采购、物流数据的统计与分析方法，通过数据驱动供应链决策，降低成本、提升效率。
      </p>
    </div>

    <div class="card">
      <h3 class="font-medium mb-3">选择题：以下哪项是供应链数据分析的目标？</h3>
      <div class="choice"><input type="radio" name="q1" value="A"> A. 优化库存水平</div>
      <div class="choice"><input type="radio" name="q1" value="B"> B. 增加库存积压</div>
      <div class="choice"><input type="radio" name="q1" value="C"> C. 延迟订单交付</div>
      <button onclick="check1()" class="mt-3 px-4 py-2 bg-blue-600 rounded">提交</button>
      <div id="r1" class="mt-3 text-green-400"></div>
    </div>

    <div class="card">
      <h3 class="font-medium mb-3">简答题：EOQ经济订货批量的核心目的是？</h3>
      <textarea id="ans2" class="w-full h-20 bg-slate-900 border border-slate-600 rounded p-3 text-white"></textarea>
      <button onclick="check2()" class="mt-3 px-4 py-2 bg-blue-600 rounded">提交</button>
      <div id="r2" class="mt-3 text-green-400"></div>
    </div>
  </div>

<script>
function check1(){
  let v = document.querySelector('input[name="q1"]:checked');
  if(!v){document.getElementById("r1").innerText="请选择选项";return;}
  document.getElementById("r1").innerText = v.value==="A" ? "回答正确 ✔" : "回答错误 ✘ 正确答案：A";
}
function check2(){
  let ans = document.getElementById("ans2").value.trim();
  document.getElementById("r2").innerText = ans.includes("成本") || ans.includes("库存") ? "回答方向正确 ✔" : "可从降低库存成本、优化订货量方向作答";
}
</script>
</body>
</html>
