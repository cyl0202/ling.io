<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python基础</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background-color: #0f172a; color: #f1f5f9; }
.card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
.choice { margin: 0.5rem 0; }
</style>
</head>
<body class="px-4 py-10">
  <div class="max-w-4xl mx-auto">
    <a href="index.html" class="text-blue-400 mb-6 inline-block">← 返回首页</a>

    <div class="card">
      <h1 class="text-2xl font-bold mb-3">Python基础</h1>
      <p class="text-slate-400 leading-relaxed">
        本课程是编程入门基础，系统讲解Python核心语法，包括变量、数据类型、条件判断、循环、函数等内容，帮助你建立编程思维，为后续数据分析打下基础。
      </p>
    </div>

    <div class="card">
      <h3 class="font-medium mb-3">选择题：Python中表示注释的符号是？</h3>
      <div class="choice"><input type="radio" name="q1" value="A"> A. #</div>
      <div class="choice"><input type="radio" name="q1" value="B"> B. //</div>
      <div class="choice"><input type="radio" name="q1" value="C"> C. /* */</div>
      <button onclick="check1()" class="mt-3 px-4 py-2 bg-blue-600 rounded">提交</button>
      <div id="r1" class="mt-3 text-green-400"></div>
    </div>

    <div class="card">
      <h3 class="font-medium mb-3">简答题：请写出Python中定义函数的关键字</h3>
      <textarea id="ans2" class="w-full h-20 bg-slate-900 border border-slate-600 rounded p-3 text-white"></textarea>
      <button onclick="check2()" class="mt-3 px-4 py-2 bg-blue-600 rounded">提交</button>
      <div id="r2" class="mt-3 text-green-400"></div>
    </div>
  </div>

<script>
function check1(){
  let v = document.querySelector('input[name="q1"]:checked');
  if(!v){document.getElementById("r1").innerText="请选择选项";return;}
  document.getElementById("r1").innerText = v.value==="A" ? "回答正确 ✔" : "回答错误 ✘ 正确答案：A";
}
function check2(){
  let ans = document.getElementById("ans2").value.trim().toLowerCase();
  document.getElementById("r2").innerText = ans === "def" ? "回答正确 ✔" : "回答错误 ✘ 正确答案：def";
}
</script>
</body>
</html>
